<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>wasm-ide — C/C++ → WebAssembly in the browser</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Monaco editor from CDN (no build step) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/editor/editor.main.css" />
</head>
<body>
  <header class="toolbar">
    <span class="brand">wasm-ide</span>
    <span class="sep"></span>
    <button id="btn-compile" class="primary" title="Compile the current file to .wasm">
      <span class="icon">⚙</span> Compile
    </button>
    <button id="btn-run" title="Run the last compiled .wasm with a WASI shim">
      <span class="icon">▶</span> Run
    </button>
    <button id="btn-download" title="Download the compiled .wasm">
      <span class="icon">⭳</span> Download .wasm
    </button>
    <span class="sep"></span>
    <label class="upload" title="Upload a prebuilt .wasm to run without compiling">
      <input id="input-wasm" type="file" accept=".wasm" hidden />
      <span class="icon">↑</span> Load .wasm
    </label>
    <span class="flex-grow"></span>
    <span id="status" class="status">ready</span>
  </header>

  <main class="workbench">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Files</span>
        <div class="sidebar-actions">
          <button id="btn-new" title="New file">＋</button>
          <button id="btn-rename" title="Rename file">✎</button>
          <button id="btn-delete" title="Delete file">🗑</button>
        </div>
      </div>
      <ul id="file-list" class="file-list"></ul>
    </aside>

    <section class="editor-pane">
      <div id="editor" class="editor"></div>
    </section>
  </main>

  <section class="terminal-pane">
    <header class="terminal-header">
      <span>Terminal</span>
      <button id="btn-clear-term" title="Clear output">clear</button>
    </header>
    <pre id="terminal" class="terminal"></pre>
    <form id="stdin-form" class="stdin-form">
      <label for="stdin-input" class="stdin-label">stdin ›</label>
      <input id="stdin-input" type="text" autocomplete="off"
             placeholder="type input, press enter to send" />
    </form>
  </section>

  <!-- Monaco loader -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script>
    require.config({
      paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' }
    });
  </script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
