syntax = "proto3";

// Per-shape proto3 schemas for the unified psio-vs-externals
// benchmark.  Field numbers + types match psio's reflection order
// so wire bytes are identical between psio::protobuf and libprotobuf
// for the same shape value.
//
// Naming: pb_<Shape> to avoid colliding with the global-scope C++
// names from shapes.hpp.

message pb_Point {
   int32 x = 1;
   int32 y = 2;
}

message pb_NameRecord {
   uint64 account = 1;
   uint64 limit   = 2;
}

// proto3 has no uint16; using uint32 (still varint-encoded — same
// wire bytes for values that fit in one byte).
message pb_FlatRecord {
   uint32          id     = 1;
   string          label  = 2;
   repeated uint32 values = 3;
}

message pb_Record {
   uint32          id     = 1;
   string          label  = 2;
   repeated uint32 values = 3;
   optional uint32 score  = 4;
}

message pb_Validator {
   uint64 pubkey_lo          = 1;
   uint64 pubkey_hi          = 2;
   uint64 withdrawal_lo      = 3;
   uint64 withdrawal_hi      = 4;
   uint64 effective_balance  = 5;
   bool   slashed            = 6;
   uint64 activation_epoch   = 7;
   uint64 exit_epoch         = 8;
   uint64 withdrawable_epoch = 9;
}

message pb_LineItem {
   string product    = 1;
   uint32 qty        = 2;
   double unit_price = 3;
}

message pb_UserProfile {
   uint64 id       = 1;
   string name     = 2;
   string email    = 3;
   uint32 age      = 4;
   bool   verified = 5;
}

message pb_Order {
   uint64                  id       = 1;
   pb_UserProfile          customer = 2;
   repeated pb_LineItem    items    = 3;
   double                  total    = 4;
   optional string         note     = 5;
}

message pb_ValidatorList {
   uint64                  epoch      = 1;
   repeated pb_Validator   validators = 2;
}
